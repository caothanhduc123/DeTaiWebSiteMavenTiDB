name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project
        run: mvn clean package
  # Quét lỗi logic SAST 
    # sử dụng SportBugs  
    
#      - name: Run SpotBugs 
#        run: mvn spotbugs:spotbugs
#    # sử dụng SonarQube
#      - name: Cache SonarQube packages
#        uses: actions/cache@v4
#        with:
#          path: ~/.sonar/cache
#          key: ${{ runner.os }}-sonar
#          restore-keys: ${{ runner.os }}-sonar
#
# 
#      - name: Build and analyze with Maven
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
#          
      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: DeTai_2Maven
          path: target/*.war



  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/detai_2maven:latest .
  # Quét lỗi các thư viện mã nguồn mở có lổ hổng SCA
    # sử dụng Grype
     # Quét lỗi các thư viện mã nguồn mở có lổ hổng SCA
    # sử dụng Grype
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

#      - name: Scan Docker Image
#        run: |
#          grype ${{ secrets.DOCKER_USERNAME }}/detai_2maven:latest --fail-on high
      - uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype.json
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/detai_2maven:latest

  deploy:
    needs: docker
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Runner
        run: |
          whoami
          hostname
          kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/detai_2maven-deployment -n detai_2maven
          kubectl rollout status deployment/detai_2maven-deployment -n detai_2maven