apiVersion: v1
kind: Namespace
metadata:
  name: detai_2maven

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detai_2maven-deployment
  namespace: detai_2maven
spec:
  replicas: 5
  selector:
    matchLabels:
      app: detai_2maven
  template:
    metadata:
      labels:
        app: detai_2maven
    spec:
      containers:
        - name: detai_2maven
          image: caothanhduc/detai_2maven:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: detai_2maven-service
  namespace: detai_2maven
spec:
  selector:
    app: detai_2maven
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: detai_2maven-ingress
  namespace: detai_2maven
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: detai_2maven.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: detai_2maven-service
                port:
                  number: 80